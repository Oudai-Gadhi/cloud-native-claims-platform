name: Full DevSecOps Pipeline (CI/CD + Security)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:

# =========================
# 1. GITLEAKS (Secrets)
# =========================
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2


# =========================
# 2. SEMGREP (SAST)
# =========================
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci


# =========================
# 3. TRIVY FILESYSTEM SCAN
# =========================
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1


# =========================
# 4. BUILD FRONTEND
# =========================
  build-frontend:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}


# =========================
# 5. BUILD BACKEND
# =========================
  build-backend:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}


# =========================
# 6. TRIVY IMAGE SCAN
# =========================
  trivy-image:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_BASE }}/frontend:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_BASE }}/backend:latest
          severity: CRITICAL,HIGH
          exit-code: 1


# =========================
# 7. OWASP ZAP (DAST)
# =========================
  zap:
    needs: [build-frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Run frontend container (Vite on 5173)
      - name: Run frontend container
        run: |
          docker run -d -p 5173:5173 --name frontend \
          ${{ env.IMAGE_BASE }}/frontend:latest

      - name: Wait for app
        run: sleep 15

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:5173

      - name: Cleanup
        if: always()
        run: |
          docker stop frontend || true
          docker rm frontend || true
