name: Full DevSecOps Pipeline (CI/CD + Security)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io
  API_URL: https://island-astronomy-jobs-warriors.trycloudflare.com/api/security/reports


jobs:

# =========================
# 1. SAST + SECRETS
# =========================

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks (JSON)
        run: |
          gitleaks detect \
            --report-format json \
            --report-path gitleaks.json || true


  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (JSON)
        run: |
          semgrep scan --config auto \
            --json --output semgrep.json || true


  trivy-fs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS (JSON)
        run: |
          trivy fs \
            --format json \
            -o trivy-fs.json . || true


# =========================
# 2. BUILD (NO PUSH YET)
# =========================

  build-images:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_ENV

      - name: Build frontend
        run: docker build -t frontend:test ./frontend

      - name: Build backend
        run: docker build -t backend:test ./backend


# =========================
# 3. TRIVY IMAGE SCAN
# =========================

  trivy-image:
    needs: [build-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        run: docker build -t frontend:test ./frontend

      - name: Build backend
        run: docker build -t backend:test ./backend

      - name: Scan frontend image (JSON)
        run: |
          trivy image \
            --format json \
            -o trivy-frontend.json frontend:test || true

      - name: Scan backend image (JSON)
        run: |
          trivy image \
            --format json \
            -o trivy-backend.json backend:test || true


# =========================
# 4. PUSH TO GHCR
# =========================

  push-images:
    needs: [trivy-image]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}


# =========================
# 5. ZAP (DAST FIXED)
# =========================

  zap:
    needs: [push-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull frontend image
        run: docker pull $IMAGE_BASE/frontend:latest

      - name: Run frontend container
        run: |
          docker run -d -p 8080:8080 --name frontend $IMAGE_BASE/frontend:latest

      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting... $i"
            sleep 2
          done
          docker logs frontend
          exit 1

      - name: Run OWASP ZAP (FIXED PATH)
        run: |
          mkdir -p zap-reports

          docker run --rm \
            --user root \
            --network=host \
            -v $PWD/zap-reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -J zap.json -w zap.md -r zap.html || true

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-reports/


# =========================
# 6. BUILD + SEND REPORT (FIXED)
# =========================

      - name: Build unified security report JSON
        run: |
          python3 - << 'EOF'
          import json
          import os

          def load(path):
              if not os.path.exists(path):
                  return {"missing": True}
              try:
                  with open(path) as f:
                      return json.load(f)
              except:
                  return {"invalid": True}

          report = {
              "deployment": {
                  "commit_sha": os.getenv("GITHUB_SHA"),
                  "branch": os.getenv("GITHUB_REF_NAME"),
                  "github_run_id": os.getenv("GITHUB_RUN_ID")
              },
              "scans": [
                  {"tool": "SEMGREP", "report": load("semgrep.json")},
                  {"tool": "TRIVY_FS", "report": load("trivy-fs.json")},
                  {"tool": "TRIVY_FRONTEND", "report": load("trivy-frontend.json")},
                  {"tool": "TRIVY_BACKEND", "report": load("trivy-backend.json")},
                  {"tool": "GITLEAKS", "report": load("gitleaks.json")},
                  {"tool": "ZAP", "report": load("zap-reports/zap.json")}
              ]
          }

          with open("security-report.json", "w") as f:
              json.dump(report, f, indent=2)

          print("security-report.json created")
          EOF

      - name: Send report to API
        run: |
          curl -X POST $API_URL \
            -H "Content-Type: application/json" \
            -d @security-report.json

      - name: Cleanup container
        if: always()
        run: docker rm -f frontend || true
