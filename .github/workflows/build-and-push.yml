name: Full DevSecOps Pipeline (CI/CD + Security)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io
  API_URL: https://island-astronomy-jobs-warriors.trycloudflare.com/api/security/reports


jobs:

# =========================
# 1. SAST + SECRETS
# =========================

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks (JSON)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path gitleaks.json || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks
          path: gitleaks.json


  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep
          path: semgrep.json


  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Run Trivy FS (JSON)
        run: trivy fs --format json -o trivy-fs.json . || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs
          path: trivy-fs.json


# =========================
# 2. BUILD
# =========================

  build-images:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        run: docker build -t frontend:test ./frontend

      - name: Build backend
        run: docker build -t backend:test ./backend


# =========================
# 3. TRIVY IMAGE SCAN
# =========================

  trivy-image:
    needs: [build-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.56.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.56.2_Linux-64bit.deb

      - name: Build images
        run: |
          docker build -t frontend:test ./frontend
          docker build -t backend:test ./backend

      - name: Scan frontend image (JSON)
        run: trivy image --format json -o trivy-frontend.json frontend:test || true

      - name: Scan backend image (JSON)
        run: trivy image --format json -o trivy-backend.json backend:test || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-images
          path: |
            trivy-frontend.json
            trivy-backend.json


# =========================
# 4. PUSH TO GHCR
# =========================

  push-images:
    needs: [trivy-image]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE
        run: echo "IMAGE_BASE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}


# =========================
# 5. ZAP + REPORTING
# =========================

  zap:
    needs: [push-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE
        run: echo "IMAGE_BASE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull $IMAGE_BASE/backend:latest

      - name: Run container
        run: docker run -d -p 8080:8080 --name app $IMAGE_BASE/backend:latest

      - name: Wait app
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 && exit 0
            sleep 2
          done
          docker logs app
          exit 1

      - name: Run ZAP
        run: |
          mkdir -p zap-reports
          docker run --rm --network=host \
            -v $PWD/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080 \
            -J zap.json -w zap.md -r zap.html || true

      - name: Upload ZAP
        uses: actions/upload-artifact@v4
        with:
          name: zap
          path: zap-reports


# =========================
# 6. SEND REPORT TO API
# =========================

      - name: Build final JSON report
        run: |
          python3 - << 'EOF'
          import json, os

          def load(p):
              try:
                  with open(p) as f:
                      return json.load(f)
              except:
                  return {}

          report = {
              "deployment": {
                  "sha": os.getenv("GITHUB_SHA"),
                  "branch": os.getenv("GITHUB_REF_NAME"),
                  "run_id": os.getenv("GITHUB_RUN_ID")
              },
              "scans": {
                  "semgrep": load("semgrep.json"),
                  "gitleaks": load("gitleaks.json"),
                  "trivy_fs": load("trivy-fs.json"),
                  "trivy_frontend": load("trivy-frontend.json"),
                  "trivy_backend": load("trivy-backend.json"),
                  "zap": load("zap.json")
              }
          }

          with open("security-report.json", "w") as f:
              json.dump(report, f, indent=2)

          print("OK report generated")
          EOF

      - name: Send report
        run: |
          curl -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d @security-report.json || true

      - name: Cleanup
        if: always()
        run: docker rm -f app || true
