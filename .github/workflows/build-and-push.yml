name: Full DevSecOps Pipeline (CI/CD + Security)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io
  API_URL: https://poem-tags-greensboro-trusts.trycloudflare.com/api/security/reports


jobs:

# =========================
# 1. SAST + SECRETS
# =========================

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks (JSON)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        with:
          args: detect --report-format json --report-path gitleaks.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks
          path: gitleaks.json


  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep
          path: semgrep.json


  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Run Trivy FS (JSON)
        run: trivy fs --format json -o trivy-fs.json . || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs
          path: trivy-fs.json


# =========================
# 2. BUILD
# =========================

  build-images:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        run: docker build -t frontend:test ./frontend

      - name: Build backend
        run: docker build -t backend:test ./backend


# =========================
# 3. TRIVY IMAGE SCAN
# =========================

  trivy-image:
    needs: [build-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Build images
        run: |
          docker build -t frontend:test ./frontend
          docker build -t backend:test ./backend

      - name: Scan frontend image (JSON)
        run: trivy image --format json -o trivy-frontend.json frontend:test || true

      - name: Scan backend image (JSON)
        run: trivy image --format json -o trivy-backend.json backend:test || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-images
          path: |
            trivy-frontend.json
            trivy-backend.json


# =========================
# 4. PUSH TO GHCR
# =========================

  push-images:
    needs: [trivy-image]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE
        run: echo "IMAGE_BASE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}


# =========================
# 5. ZAP (frontend only, for now) + REPORTING
# =========================

  zap:
    needs: [push-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE
        run: echo "IMAGE_BASE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull $IMAGE_BASE/frontend:latest

      - name: Run container
        run: docker run -d -p 8080:8080 --name app $IMAGE_BASE/frontend:latest

      - name: Wait app
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 && exit 0
            sleep 2
          done
          docker logs app
          exit 1

      - name: Run ZAP
        run: |
          mkdir -p zap-reports
          docker run --rm --network=host \
            -v $PWD/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080 \
            -J zap.json -w zap.md -r zap.html || true

      - name: Upload ZAP
        uses: actions/upload-artifact@v4
        with:
          name: zap
          path: zap-reports

      - name: Cleanup app container
        if: always()
        run: docker rm -f app || true

      # ---- Pull in every other job's scan results before building the report ----

      - name: Download gitleaks report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: gitleaks

      - name: Download semgrep report
        uses: actions/download-artifact@v4
        with:
          name: semgrep

      - name: Download trivy-fs report
        uses: actions/download-artifact@v4
        with:
          name: trivy-fs

      - name: Download trivy image reports
        uses: actions/download-artifact@v4
        with:
          name: trivy-images

      - name: Prepare files for report script
        run: |
          # build_security_report.py expects trivy-image.json (singular) and
          # zap.json at the workspace root - reshape what we actually produced
          # into what it expects, without touching the script itself.
          python3 - << 'EOF'
          import json

          def load(p):
              try:
                  with open(p) as f:
                      return json.load(f)
              except Exception:
                  return {}

          fe = load("trivy-frontend.json")
          be = load("trivy-backend.json")
          merged = {
               "Results": (fe.get("Results") or []) + (be.get("Results") or [])
          }
          with open("trivy-image.json", "w") as f:
              json.dump(merged, f)
          EOF

          cp zap-reports/zap.json zap.json || echo "{}" > zap.json

      - name: Build final JSON report
        run: python3 scripts/build_security_report.py
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}

      - name: Send report
        run: |
          curl -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d @security-report.json || true
