name: Full DevSecOps Pipeline (CI/CD + Security)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  issues: write
  actions: write

env:
  REGISTRY: ghcr.io


jobs:

# =========================
# 1.GITLEAKS (Secrets)
# =========================
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2


# =========================
# 2. SEMGREP (SAST)
# =========================
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci


# =========================
# 3. TRIVY FILESYSTEM SCAN
# =========================
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1


# =========================
# 4. BUILD FRONTEND
# =========================
  build-frontend:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV


      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}


# =========================
# 5. BUILD BACKEND
# =========================
  build-backend:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV


      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}


# =========================
# 6. TRIVY IMAGE SCAN
# =========================
  trivy-image:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}/frontend:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}/backend:latest
          severity: CRITICAL,HIGH
          exit-code: 1
# =========================
# 7. OWASP ZAP (DAST)
# =========================
  # =========================
# 7. OWASP ZAP (DAST)
# =========================
  zap:
    needs: [build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set IMAGE_BASE lowercase
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull frontend image
      run: docker pull $IMAGE_BASE/frontend:latest

      - name: Run frontend container
        run: |
          docker run -d \
            -p 5173:5173 \
            --name frontend \
            $IMAGE_BASE/frontend:latest

      - name: Wait for app
        run: |
          sleep 20
          curl -I http://localhost:5173

      - name: Create reports folder
        run: mkdir -p zap-reports

      - name: Run OWASP ZAP Baseline
        run: |
          docker run --rm \
            --network=host \
            -v $(pwd)/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5173 \
            -J zap.json \
            -w zap.md \
            -r zap.html || true

      - name: Show generated reports
        run: ls -lah zap-reports

      - name: Upload ZAP reports to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-reports/*
