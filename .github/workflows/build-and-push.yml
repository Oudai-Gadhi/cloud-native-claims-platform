name: Full DevSecOps Pipeline (CI/CD + Security)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io
  API_URL: https://island-astronomy-jobs-warriors.trycloudflare.com/api/security/reports


jobs:

# =========================
# 1. SAST + SECRETS
# =========================
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2


  semgrep:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto


  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1


# =========================
# 2. BUILD (NO PUSH YET)
# =========================
  build-images:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_ENV

      - name: Build frontend (LOCAL)
        run: docker build -t frontend:test ./frontend

      - name: Build backend (LOCAL)
        run: docker build -t backend:test ./backend


# =========================
# 3. TRIVY IMAGE SCAN (LOCAL)
# =========================
  trivy-image:
    needs: [build-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        run: docker build -t frontend:test ./frontend

      - name: Build backend
        run: docker build -t backend:test ./backend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:test
          severity: CRITICAL
          exit-code: 0

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:test
          severity: CRITICAL,HIGH
          exit-code: 0


# =========================
# 4. PUSH TO GHCR
# =========================
  push-images:
    needs: [trivy-image]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}


# =========================
# 5. ZAP (DAST)
# =========================
  zap:
    needs: [push-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull frontend image
        run: docker pull $IMAGE_BASE/frontend:latest

      - name: Run frontend container
        run: |
          docker run -d -p 8080:8080 --name frontend $IMAGE_BASE/frontend:latest

      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8080; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app... ($i)"
            sleep 2
          done
          echo "App did not become ready in time"
          docker logs frontend
          exit 1

      - name: Run OWASP ZAP
        run: |
          mkdir -p zap-reports
          docker run --rm \
            --user root \
            --network=host \
            -v $PWD/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -J zap.json -w zap.md -r zap.html || true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-reports/


# =========================
# 6. NEW: BUILD + SEND SECURITY REPORT
# =========================
      - name: Build security report JSON
        run: |
          python3 - << 'EOF'
          import json
          import os

          def load(file):
              try:
                  with open(file) as f:
                      return json.load(f)
              except:
                  return {}

          report = {
              "deployment": {
                  "commit_sha": os.getenv("GITHUB_SHA"),
                  "branch": os.getenv("GITHUB_REF_NAME"),
                  "github_run_id": os.getenv("GITHUB_RUN_ID")
              },
              "scans": [
                  {"tool": "SEMGREP", "report": load("semgrep.json")},
                  {"tool": "TRIVY_FS", "report": load("trivy-fs.json")},
                  {"tool": "TRIVY_IMAGE", "report": load("trivy-image.json")},
                  {"tool": "GITLEAKS", "report": load("gitleaks.json")},
                  {"tool": "ZAP", "report": load("zap.json")}
              ]
          }

          with open("security-report.json", "w") as f:
              json.dump(report, f, indent=2)

          print("security-report.json created")
          EOF

      - name: Send report to API
        run: |
          curl -X POST $API_URL \
            -H "Content-Type: application/json" \
            -d @security-report.json

      - name: Cleanup container
        if: always()
        run: docker rm -f frontend || true
