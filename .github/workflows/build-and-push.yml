name: Full DevSecOps Pipeline (CI/CD + Security)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io


# =========================
# 1. SAST + SECRETS
# =========================
jobs:

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2


  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci


  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1


# =========================
# 2. BUILD (NO PUSH YET)
# =========================
  build-images:
    needs: [gitleaks, semgrep, trivy-fs]
    runs-on: ubuntu-latest

    outputs:
      image_base: ${{ steps.set.outputs.image_base }}

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        id: set
        run: |
          IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')
          echo "image_base=$IMAGE_BASE" >> $GITHUB_OUTPUT

      - name: Build frontend (LOCAL)
        run: docker build -t frontend:test ./frontend

      - name: Build backend (LOCAL)
        run: docker build -t backend:test ./backend


# =========================
# 3. TRIVY IMAGE SCAN (LOCAL)
# =========================
  trivy-image:
    needs: [build-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend (again for scan context)
        run: docker build -t frontend:test ./frontend

      - name: Build backend
        run: docker build -t backend:test ./backend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:test
          severity: CRITICAL
          exit-code: 0
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:test
          severity: CRITICAL,HIGH
          exit-code: 1


# =========================
# 4. PUSH TO GHCR (ONLY IF CLEAN)
# =========================
  push-images:
    needs: [trivy-image]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}


# =========================
# 5. ZAP (DAST)
# =========================
  zap:
    needs: [push-images]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set IMAGE_BASE lowercase
        run: |
          echo "IMAGE_BASE=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull frontend image
        run: docker pull $IMAGE_BASE/frontend:latest

      - name: Run frontend container
        run: |
          docker run -d -p 5173:5173 --name frontend $IMAGE_BASE/frontend:latest

      - name: Wait for app
        run: |
          sleep 20
          curl -I http://localhost:5173

      - name: Run OWASP ZAP
        run: |
          mkdir -p zap-reports
          docker run --rm \
            --network=host \
            -v $PWD/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5173 \
            -J zap.json -w zap.md -r zap.html || true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-reports/
