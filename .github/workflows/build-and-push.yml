name: Full DevSecOps Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  API_URL: https://cherry-installed-limitation-charging.trycloudflare.com/api/security/reports

jobs:

# =========================
# 1. SAST + SECRETS
# =========================
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ---------------- SEMGREP ----------------
      - name: Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto --json > semgrep.json || true

      # ---------------- TRIVY FS ----------------
      - name: Trivy FS
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          ./trivy fs --format json -o trivy-fs.json . || true

      # ---------------- GITLEAKS ----------------
      - name: Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64.tar.gz | tar xz
          ./gitleaks detect --report-format json --report-path gitleaks.json || true

      # ---------------- BUILD IMAGES ----------------
      - name: Build Docker images
        run: |
          docker build -t frontend:test ./frontend
          docker build -t backend:test ./backend

      # ---------------- TRIVY IMAGE ----------------
      - name: Trivy Image
        run: |
          ./trivy image --format json -o trivy-image.json backend:test || true

      # ---------------- ZAP ----------------
      - name: Run ZAP baseline
        run: |
          docker run -d -p 8080:80 --name app frontend:test || true
          sleep 10
          docker run --network=host ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080 \
            -J zap.json -r zap.html || true

      # =========================
      # 2. BUILD UNIFIED REPORT
      # =========================
      - name: Build security report
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python scripts/build_security_report.py

      # =========================
      # 3. SEND TO BACKEND
      # =========================
      - name: Send report to API
        run: |
          curl -X POST $API_URL \
            -H "Content-Type: application/json" \
            -d @security-report.json
